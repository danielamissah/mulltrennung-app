# CI pipeline for Mülltrennung App (React Native / Expo)
# Runs on every push and pull request to main.
# Catches TypeScript errors and broken builds before they reach production.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # TypeScript strict mode — catches type errors before the app ships
      - name: Type check
        run: npx tsc --noEmit

      # ESLint — enforces consistent code style across the project
      - name: Lint
        run: npx eslint . --ext .ts,.tsx --max-warnings 0

  expo-build-check:
    name: Expo Build Check
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Expo CLI
        run: npm install -g expo-cli@latest

      # Export validates the full bundle compiles without errors.
      # We use --platform web so this runs without needing Android/iOS SDKs.
      - name: Expo export (web — validates bundle)
        run: npx expo export --platform web
        env:
          CI: true